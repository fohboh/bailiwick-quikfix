/* Compute Trust Score from vetting record — port of computeTrustScore() in mge-demo.js */
function mgeComputeTrustScore(vetting) {
  const components = {};
  const iv    = vetting.identity_verification || {};
  const bc    = vetting.background_check || {};
  const coi   = vetting.coi || {};
  const lic   = vetting.license || {};
  const perf  = vetting.performance || {};
  const rat   = vetting.customer_rating || {};
  
  components.C1 = iv.status === "confirmed" ? 100 : 0;
  
  if (bc.status === "clear") components.C2 = 100;
  else if (bc.status === "pending") components.C2 = (bc.hours_since_request || 0) > 72 ? 0 : 50;
  else components.C2 = 0;
  
  if (coi.status === "expired" || coi.status === "pending") components.C3 = 0;
  else if ((coi.days_until_expiry || 999) <= 30) components.C3 = 70;
  else components.C3 = 100;
  
  if (lic.status === "not_required" || lic.status === "valid") components.C4 = 100;
  else components.C4 = 0;
  
  if ((perf.total_jobs || 0) < 3) components.C5 = 50;
  else {
    const onTime = perf.jobs_completed_on_time / perf.total_jobs;
    const bonus = (perf.callback_rate || 0) < 0.05 ? 20 : 0;
    components.C5 = Math.round((onTime * 80 + bonus) * 10) / 10;
  }
  
  if ((rat.total_ratings || 0) < 3) components.C6 = 50;
  else components.C6 = Math.round((rat.average_rating / 5.0) * 100 * 10) / 10;
  
  const blockingReasons = [];
  if (components.C1 === 0) blockingReasons.push("Identity not verified");
  if (components.C2 === 0) blockingReasons.push(bc.status === "flagged" ? "Background check flagged" : "Background check pending >72h");
  if (components.C3 === 0) blockingReasons.push(coi.status === "expired" ? "COI expired" : "COI pending");
  if (components.C4 === 0) blockingReasons.push("License expired or suspended");
  const anyBlocked = blockingReasons.length > 0;
  
  const warnings = [];
  if (components.C3 === 70) warnings.push("COI expires in " + (coi.days_until_expiry || "?") + " days");
  if (components.C2 === 50) warnings.push("Background check pending (" + (bc.hours_since_request || 0) + "h)");
  
  let score;
  if (anyBlocked) score = 0;
  else score = Math.round((
    components.C1 * 0.20 + components.C2 * 0.20 + components.C3 * 0.20 +
    components.C4 * 0.15 + components.C5 * 0.15 + components.C6 * 0.10
  ) * 10) / 10;
  
  let tier;
  if (score === 0) tier = "blocked";
  else if (score >= 85) tier = "auto";
  else if (score >= 70) tier = "review";
  else tier = "blocked";
  
  return { score, components, anyBlocked, blockingReasons, warnings, dispatchTier: tier };
}

/* Rule evaluator — port of evaluateRules() */
function mgeEvaluateRules(scenario) {
  const fired = [];
  if (scenario.vetting) {
    if (scenario.vetting.coi && scenario.vetting.coi.status === "expired") fired.push("R-QF-001");
    if (scenario.vetting.identity_verification && scenario.vetting.identity_verification.status !== "confirmed") fired.push("R-QF-002");
    if (scenario.vetting.background_check && scenario.vetting.background_check.status === "pending" && (scenario.vetting.background_check.hours_since_request || 0) > 72) fired.push("R-QF-003");
    if (scenario.vetting.background_check && scenario.vetting.background_check.status === "flagged") fired.push("R-QF-027");
  }
  if (scenario.job) {
    if ((scenario.job.certified_confidence != null ? scenario.job.certified_confidence : 1) < 0.75) fired.push("R-QF-004");
  }
  if (scenario.location && scenario.location.service_zone === false) fired.push("R-QF-005");
  if (scenario.service_request && scenario.service_request.hazard_detected === true) fired.push("R-QF-006");
  if (scenario.contractor && scenario.contractor.location_age_minutes > 5) fired.push("R-QF-007");
  if (scenario.pricing) {
    if ((scenario.pricing.quoted_flat_rate_usd || 0) > (scenario.pricing.rate_card_flat_rate_usd || Infinity)) fired.push("R-QF-008");
  }
  if (scenario.customer && scenario.customer.authorized_limit && scenario.job && scenario.job.certified_flat_rate_usd > scenario.customer.authorized_limit) fired.push("R-QF-014");
  if (scenario.job && scenario.job.required_specialty && scenario.contractor && scenario.contractor.specialties) {
    if (!scenario.contractor.specialties.includes(scenario.job.required_specialty)) fired.push("R-QF-021");
  }
  if (scenario.vetting) {
    const ts = mgeComputeTrustScore(scenario.vetting);
    if (ts.score >= 70 && ts.score < 85) fired.push("R-QF-026");
  }
  return fired;
}

/* Run one test scenario and compare against expected_results */
function mgeRunScenario(scenario) {
  const rulesFired = mgeEvaluateRules(scenario);
  let trust = null;
  if (scenario.vetting) trust = mgeComputeTrustScore(scenario.vetting);
  const exp = scenario.expected_results;
  const checks = [];
  
  if (exp.trust_score !== undefined && trust) {
    const match = Math.abs(trust.score - exp.trust_score) < 1.0;
    checks.push({ check: "Trust Score", expected: exp.trust_score, actual: trust.score, pass: match });
  }
  if (exp.dispatch_tier) {
    const actual = trust && trust.score === 0 ? "blocked" :
      rulesFired.includes("R-QF-005") || rulesFired.includes("R-QF-006") ? "escalate" :
      rulesFired.includes("R-QF-004") || rulesFired.includes("R-QF-014") ? "review" :
      (trust ? trust.dispatchTier : "auto");
    checks.push({ check: "Dispatch Tier", expected: exp.dispatch_tier, actual: actual, pass: actual === exp.dispatch_tier });
  }
  if (exp.rules_fired) {
    const actualSet = new Set(rulesFired);
    const match = exp.rules_fired.length === rulesFired.length && exp.rules_fired.every(function(r){return actualSet.has(r);});
    checks.push({ check: "Rules Fired", expected: exp.rules_fired, actual: rulesFired, pass: match });
  }
  if (exp.blocking_triggered !== undefined && trust) {
    checks.push({ check: "Blocking Triggered", expected: exp.blocking_triggered, actual: trust.anyBlocked, pass: trust.anyBlocked === exp.blocking_triggered });
  }
  
  return {
    id: scenario.id,
    name: scenario.name,
    description: scenario.description,
    pass: checks.every(function(c){return c.pass;}),
    checks: checks,
    trust_score: trust ? trust.score : null,
    trust_components: trust ? trust.components : null,
    rules_fired: rulesFired
  };
}

/* Run the full 15-scenario suite */
function mgeRunAllScenarios() {
  const results = MGE_TEST_SCENARIOS.map(mgeRunScenario);
  const passed = results.filter(function(r){return r.pass;}).length;
  return {
    summary: {
      total: results.length,
      passed: passed,
      failed: results.length - passed,
      status: passed === results.length ? "✅ ALL TESTS PASSED" : "❌ " + (results.length - passed) + " TESTS FAILED",
      mge_version: MGE.version,
      ontology_entities: MGE.ontology_entities,
      rules_loaded: MGE.rules_total,
      trust_components: MGE.trust_components,
      timestamp: new Date().toISOString()
    },
    results: results
  };
}

/* Certify a job — produces an immutable Certified Job Record */
function mgeCertifyJob(job, pro) {
  const now = new Date().toISOString();
  const specialty = (job && job.type) ? job.type : null;
  const fixText = ((job && job.fix) || "").toLowerCase();
  const hazard = fixText.indexOf("gas") !== -1 || fixText.indexOf("spark") !== -1 || fixText.indexOf("fire") !== -1 || fixText.indexOf("smoke") !== -1 || fixText.indexOf("burn") !== -1;
  const scenario = {
    job: {
      job_id: job.id,
      certified_job_type: job.type,
      certified_flat_rate_usd: job.rate,
      certified_confidence: (job.confidence || 0) / 100,
      required_specialty: specialty
    },
    location: { service_zone: true },
    service_request: { hazard_detected: hazard },
    contractor: pro ? {
      pro_id: pro.id,
      specialties: pro.specialties || (pro.trade ? [pro.trade.toLowerCase().replace(" pro", "").replace("handyman", "drywall")] : []),
      trust_score: pro.trustScore,
      location_age_minutes: pro.locationAgeMin || 1
    } : null,
    vetting: pro ? pro.vetting : null
  };
  const rulesFired = mgeEvaluateRules(scenario);
  const trust = pro && pro.vetting ? mgeComputeTrustScore(pro.vetting) : null;
  
  const blockingFired = rulesFired.filter(function(r){
    return ["R-QF-001","R-QF-002","R-QF-003","R-QF-004","R-QF-005","R-QF-006","R-QF-007","R-QF-027","R-QF-028"].indexOf(r) !== -1;
  });
  const priceCertified = rulesFired.indexOf("R-QF-008") === -1 && rulesFired.indexOf("R-QF-010") === -1 && rulesFired.indexOf("R-QF-012") === -1;
  
  let tier;
  if (rulesFired.indexOf("R-QF-006") !== -1 || rulesFired.indexOf("R-QF-005") !== -1) tier = "escalate";
  else if (blockingFired.length > 0) tier = "blocked";
  else if (rulesFired.indexOf("R-QF-004") !== -1 || rulesFired.indexOf("R-QF-014") !== -1 || rulesFired.indexOf("R-QF-026") !== -1) tier = "review";
  else if (trust && trust.score === 0) tier = "blocked";
  else if (trust && trust.score >= 85) tier = "auto";
  else if (trust && trust.score >= 70) tier = "review";
  else tier = job.tier || "auto";
  
  const quikfixEligible = blockingFired.length === 0 && priceCertified && (job.confidence || 0) >= 75 && tier !== "blocked" && tier !== "escalate";
  
  return {
    job_id: job.id,
    mge_version: MGE.version,
    certified_at: now,
    certified_job_type: job.type,
    certified_flat_rate_usd: job.rate,
    certified_confidence: (job.confidence || 0) / 100,
    certified_quikfix_eligible: quikfixEligible,
    dispatch_tier: tier,
    blocking_conditions_triggered: blockingFired,
    rules_fired: rulesFired,
    price_certified: priceCertified,
    contractor_trust_score: trust ? trust.score : null,
    contractor_blocking_reasons: trust ? trust.blockingReasons : [],
    immutable: true
  };
}
